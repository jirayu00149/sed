<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Economy Final Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>Engineering Economy Quiz</h1>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div class="stats">
                <span id="question-number">ข้อที่ 1 / 50</span>
                <span id="current-score">คะแนน: 0</span>
            </div>
        </header>

        <main id="quiz-body">
            <div id="question-text" class="question">กำลังโหลดคำถาม...</div>
            <div id="options-list" class="options"></div>
            <div id="feedback" class="feedback hidden">
                <div id="feedback-message"></div>
                <div id="explanation-text" class="explanation"></div>
            </div>
        </main>

        <footer>
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">ข้อถัดไป</button>
        </footer>
    </div>

    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2>สรุปผลการทดสอบ</h2>
            <div class="final-score-display">
                <span id="final-score">0</span> / 50
            </div>
            <p id="evaluation"></p>
            <button class="btn" onclick="startQuiz()">เริ่มทำใหม่</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
