<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Economy Quiz | Nawat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>Engineering Economy Quiz</h1>
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p id="question-counter">ข้อที่ 1 / 50</p>
        </header>

        <main id="quiz-content">
            <div id="question-text" class="question-text">กำลังโหลดคำถาม...</div>
            <div id="options-container" class="options-grid"></div>
            <div id="explanation" class="explanation-box"></div>
        </main>

        <footer class="controls">
            <button id="next-btn" onclick="handleNext()">ถัดไป</button>
        </footer>

        <section id="result-screen" class="result-screen hidden">
            <h2>สรุปผลคะแนน</h2>
            <div class="score-circle">
                <span id="final-score">0</span>/50
            </div>
            <p id="evaluation-msg"></p>
            <button onclick="location.reload()">ทำใหม่อีกครั้ง</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
